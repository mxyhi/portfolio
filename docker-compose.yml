name: portfolio

services:
  portfolio:
    image: "${IMAGE_NAME:-portfolio}:${IMAGE_TAG:-latest}"
    container_name: portfolio
    restart: unless-stopped
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      HOSTNAME: "${HOSTNAME:-0.0.0.0}"
      PORT: "${APP_PORT:-3000}"
      NEXT_PUBLIC_CLARITY_PROJECT_ID: "${NEXT_PUBLIC_CLARITY_PROJECT_ID:-}"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${HOST_PORT:-13000}:${APP_PORT:-3000}"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:${APP_PORT:-3000}').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
